name: Build APP

on:
  push:
    branches: [ "master","*"]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: 'recursive'
          fetch-depth: 0  # 获取完整历史，用于生成changelog
      
      # 设置JDK环境
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle
      
      # 设置Gradle权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      # 解码并创建密钥库文件
      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ENCODED_KEYSTORE" ]; then
            # 确保创建在项目根目录下
            echo "$ENCODED_KEYSTORE" | base64 --decode > zerotierfix.keystore
            ls -la zerotierfix.keystore
          else
            echo "No keystore found, will build unsigned APK"
          fi
      
      # 直接构建Release APK，不再专门构建Debug APK
      - name: Build Release APK
        env:
          # 使用相对路径，让 build.gradle 处理
          ZEROTIERFIX_KEYSTORE_FILE: zerotierfix.keystore
          ZEROTIERFIX_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ZEROTIERFIX_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ZEROTIERFIX_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease
      
      # 只上传Release构建产物
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
      
      # 重命名APK文件以包含版本号 (仅master分支)
      - name: Rename APK with version
        if: github.ref == 'refs/heads/master' && success()
        run: |
          VERSION="1.0.${{ github.run_number }}"
          cp app/build/outputs/apk/release/app-release.apk "ZerotierFix-v${VERSION}.apk"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "APK_FILE=ZerotierFix-v${VERSION}.apk" >> $GITHUB_ENV
      
      # 生成变更日志 (仅master分支)
      - name: Generate Changelog
        if: github.ref == 'refs/heads/master' && success()
        run: |
          echo "# ZerotierFix v${VERSION}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## 📦 构建信息 / Build Information" >> RELEASE_NOTES.md
          echo "- **版本号 / Version:** v${VERSION}" >> RELEASE_NOTES.md
          echo "- **构建号 / Build Number:** ${{ github.run_number }}" >> RELEASE_NOTES.md
          echo "- **构建日期 / Build Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> RELEASE_NOTES.md
          echo "- **提交 / Commit:** ${{ github.sha }}" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## 📝 更新内容 / Changelog" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          
          # 获取上一个tag，如果没有则从第一个commit开始
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          # 生成commit历史
          if [ -n "$PREV_TAG" ]; then
            echo "Changes since $PREV_TAG:" >> RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges >> RELEASE_NOTES.md
          else
            echo "Initial release with all commits:" >> RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            git log --pretty=format:"- %s (%h)" --no-merges >> RELEASE_NOTES.md
          fi
          
          echo "" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## 📥 下载 / Download" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "下载 \`ZerotierFix-v${VERSION}.apk\` 文件并安装到您的Android设备。" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "Download \`ZerotierFix-v${VERSION}.apk\` and install it on your Android device." >> RELEASE_NOTES.md
          
          cat RELEASE_NOTES.md
      
      # 创建GitHub Release (仅master分支)
      - name: Create Release
        if: github.ref == 'refs/heads/master' && success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: ZerotierFix v${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
          files: ${{ env.APK_FILE }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
